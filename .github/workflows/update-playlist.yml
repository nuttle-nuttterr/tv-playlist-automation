name: Update M3U Playlist

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'fetch_and_combine.py'
      - '.github/workflows/update-playlist.yml'

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch and combine playlists
        run: python fetch_and_combine.py

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet master_playlist.m3u || echo "changed=true" >> $GITHUB_OUTPUT
          git diff --quiet update_summary.txt || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add master_playlist.m3u update_summary.txt
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          git commit -m "Auto-update playlist - $TIMESTAMP

          - Fetched latest channels from all sources
          - Filtered working local channels
          - Removed duplicates
          - Combined into master_playlist.m3u"
          git push
